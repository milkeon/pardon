<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pardon은 음성을 녹음하고, STT 원문을 쭉 표시한 뒤, 정지 후 3가지 가능성을 보여주는 정적 브라우저 앱입니다." />
    <title>Pardon</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./src/app.js?v=live"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero hero--minimal">
        <h1>Pardon</h1>
      </section>

      <section class="panel panel--controls">
        <div class="control-row">
          <button class="button button--primary" data-action="start-recording">녹음 시작</button>
          <button class="button" data-action="stop-recording" disabled>정지</button>
          <button class="button" data-action="clear">초기화</button>
          <button class="button button--primary" data-action="generate">변환</button>
          <button class="button button--ghost" data-action="copy">선택한 문장 복사</button>
        </div>
        <p class="support-line" id="support-status"></p>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel__header">
            <h2>원문 STT</h2>
            <span id="transcript-status">녹음을 시작할 수 있습니다.</span>
          </div>
          <label class="field">
            <span>원문</span>
            <textarea id="transcript" rows="12" placeholder="들리는 즉시 인식된 텍스트가 여기에 쭉 표시됩니다. 직접 붙여넣어도 됩니다." spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
          </label>
          <div class="audio-box">
            <span>녹음된 오디오</span>
            <audio id="audio-playback" controls hidden></audio>
          </div>
        </article>

        <article class="panel">
          <div class="panel__header">
            <h2>제안 3가지</h2>
          </div>
          <div class="variant-guide">
            <p class="variant-guide__title">차이 읽는 법</p>
            <ul class="variant-guide__list">
              <li><strong>노란색</strong>은 원문에서 바뀐 부분입니다.</li>
              <li><strong>제안 1</strong>은 음성 인식 오류만 최소로 고칩니다.</li>
              <li><strong>제안 2</strong>는 문맥을 살려 자연스럽게 다시 씁니다.</li>
              <li><strong>제안 3</strong>은 핵심 의미까지 정리한 최종본입니다.</li>
            </ul>
          </div>
          <div id="variants-empty" class="empty-state" hidden>
            정지하면 변환 버튼으로 3가지 결과를 만들 수 있습니다.
          </div>
          <div id="variant-list" class="variant-list" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden>복사되었습니다</div>
  </body>
</html>
