<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pardon은 음성을 녹음하고 STT 원문을 보여주며, 3개의 재작성안을 고를 수 있게 해주는 정적 브라우저 앱입니다." />
    <title>Pardon</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1 class="brand-title">Pardon</h1>
        </div>
        <div class="status-pill" id="recording-badge">대기 중</div>
      </section>

      <section class="panel panel--controls">
        <!-- 주제 및 용어 힌트 인풋 패널 추가 (영어 복원율 및 특정 주제 정돈용) -->
        <div class="field field--hint" style="margin: 0 0 18px 0;">
          <span style="font-weight: 700; color: var(--primary); display: inline-flex; align-items: center; gap: 6px;">🎯 주제 및 용어 힌트 (영어 유연 복원 & 맥락 특정용)</span>
          <input type="text" id="context-hint" placeholder="예: SQLD 요약, Docker 배포, API 연동, 블로그 글쓰기" style="margin-top: 8px;" />
        </div>

        <div class="control-row">
          <button class="button button--primary" data-action="start-recording">녹음 시작</button>
          <button class="button" data-action="stop-recording" disabled>정지</button>
          <button class="button" data-action="clear">초기화</button>
          <button class="button button--ghost" data-action="copy">선택한 문장 복사</button>
        </div>
        <p class="support-line" id="support-status"></p>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel__header">
            <h2>원문 STT</h2>
            <span id="transcript-status">녹음을 시작할 수 있습니다.</span>
          </div>
          <label class="field">
            <span>원문</span>
            <textarea id="transcript" rows="10" placeholder="실시간 원문이 여기에 표시됩니다. 직접 붙여넣어도 됩니다."></textarea>
          </label>
          <div class="audio-box">
            <span>녹음된 오디오</span>
            <audio id="audio-playback" controls hidden></audio>
          </div>
        </article>

        <article class="panel">
          <div class="panel__header">
            <h2>머신러닝 인식 가능성 3가지</h2>
            <button class="button button--small" data-action="generate">다시 분석</button>
          </div>
          <!-- API 키 미설정 시 로컬 폴백 작동 상태를 품격 있게 안내해주는 경고 배너 신설 -->
          <div id="api-warning-banner" style="background: rgba(251, 113, 133, 0.14); border: 1px solid rgba(251, 113, 133, 0.38); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.92rem; color: #ffd2da; line-height: 1.5; display: none;">
            ⚠️ <strong>로컬 대체 엔진 작동 중:</strong> 서버의 <code>.env</code> 파일에 <code>OPENAI_API_KEY</code>가 세팅되어 있지 않거나 서버 연결 오류가 발생하여, 브라우저 로컬 정적 사전으로 임시 분석하고 있습니다. <strong>초정밀 머신러닝 분석</strong>을 위해 프로젝트 폴더의 <code>.env</code> 파일에 키를 입력하여 저장해 주세요.
          </div>
          <div id="variants-empty" class="empty-state" hidden>
            원문을 말하거나 붙여넣으면 유력한 해석 가능성 3가지가 표시됩니다.
          </div>
          <div id="variant-list" class="variant-list" aria-live="polite"></div>
        </article>
      </section>

    </main>
  </body>
</html>
