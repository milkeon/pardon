<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pardon은 음성을 녹음하고 STT 원문을 보여주며, 3개의 재작성안을 고를 수 있게 해주는 정적 브라우저 앱입니다." />
    <title>Pardon</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Pardon</p>
          <h1>음성을 녹음하고, STT 원문을 확인하고, 더 나은 문장으로 고르세요.</h1>
          <p class="lead">
            브라우저 오디오 녹음, STT 캡처, 그리고 문맥을 반영한 3개의 재작성안을 백엔드 없이 제공하는 정적 데모입니다.
          </p>
        </div>
        <div class="status-pill" id="recording-badge">대기 중</div>
      </section>

      <section class="panel panel--controls">
        <div class="control-row">
          <button class="button button--primary" data-action="start-recording">녹음 시작</button>
          <button class="button" data-action="stop-recording" disabled>정지</button>
          <button class="button" data-action="clear">초기화</button>
          <button class="button button--ghost" data-action="copy">선택한 문장 복사</button>
        </div>
        <p class="support-line" id="support-status"></p>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel__header">
            <h2>원문 STT</h2>
            <span id="transcript-status">녹음을 시작할 수 있습니다.</span>
          </div>
          <label class="field">
            <span>원문</span>
            <textarea id="transcript" rows="10" placeholder="실시간 원문이 여기에 표시됩니다. 직접 붙여넣어도 됩니다."></textarea>
          </label>
          <div class="audio-box">
            <span>녹음된 오디오</span>
            <audio id="audio-playback" controls hidden></audio>
          </div>
        </article>

        <article class="panel">
          <div class="panel__header">
            <h2>머신러닝 인식 가능성 3가지</h2>
            <button class="button button--small" data-action="generate">다시 분석</button>
          </div>
          <div id="variants-empty" class="empty-state" hidden>
            원문을 말하거나 붙여넣으면 유력한 해석 가능성 3가지가 표시됩니다.
          </div>
          <div id="variant-list" class="variant-list" aria-live="polite"></div>
        </article>
      </section>

      <section class="panel panel--footer">
        <label class="field field--inline">
          <span>선택 입력용 브라우저 API 키</span>
          <input id="api-key" type="password" placeholder="로컬 데모에서는 필요하지 않습니다." />
        </label>
        <p class="fine-print">
          핵심 데모는 브라우저 안에서만 동작합니다. 나중에 재작성 API를 연결하더라도, 실제 키는 공개 배포 프런트엔드에 두면 안 됩니다.
        </p>
      </section>
    </main>
  </body>
</html>
